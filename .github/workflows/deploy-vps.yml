name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust server host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure deploy key on VPS
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PUBKEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAAC7RMM3/rY6MQUAmxwN4XdCW6nXR99o42XMnjy1BxM hivra-vps-2026-03-12"
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_DEPLOY_PUBKEY='$VPS_DEPLOY_PUBKEY' bash -se" <<'REMOTE'
          set -euo pipefail
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          touch /root/.ssh/authorized_keys
          if ! grep -qxF "$VPS_DEPLOY_PUBKEY" /root/.ssh/authorized_keys; then
            printf '%s\n' "$VPS_DEPLOY_PUBKEY" >> /root/.ssh/authorized_keys
          fi
          chmod 600 /root/.ssh/authorized_keys
          REMOTE

      - name: Bootstrap nginx and TLS (idempotent)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}
          VPS_DOMAIN: ${{ secrets.VPS_DOMAIN }}
          VPS_CERTBOT_EMAIL: ${{ secrets.VPS_CERTBOT_EMAIL }}
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_TARGET_DIR='$VPS_TARGET_DIR' VPS_DOMAIN='$VPS_DOMAIN' VPS_CERTBOT_EMAIL='$VPS_CERTBOT_EMAIL' bash -se" <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          : "${VPS_TARGET_DIR:=/var/www/hivra.space/}"
          : "${VPS_DOMAIN:=hivra.space}"
          : "${VPS_CERTBOT_EMAIL:=support@hivra.space}"
          WWW_DOMAIN="www.${VPS_DOMAIN#www.}"

          apt-get update
          apt-get -y -o Dpkg::Options::="--force-confold" install nginx certbot python3-certbot-nginx rsync

          mkdir -p "$VPS_TARGET_DIR"

          cat > /etc/nginx/sites-available/hivra.space <<NGINX
          server {
              listen 80;
              listen [::]:80;
              server_name ${VPS_DOMAIN} ${WWW_DOMAIN};

              root ${VPS_TARGET_DIR%/};
              index index.html;

              location / {
                  try_files \$uri \$uri/ =404;
              }

              location /ws {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_read_timeout 86400;
              }

              error_page 404 /404.html;
          }
          NGINX

          ln -sfn /etc/nginx/sites-available/hivra.space /etc/nginx/sites-enabled/hivra.space
          rm -f /etc/nginx/sites-enabled/default
          nginx -t
          systemctl enable --now nginx
          systemctl reload nginx

          certbot --nginx \
            -d "${VPS_DOMAIN}" \
            -d "${WWW_DOMAIN}" \
            --agree-tos \
            -m "${VPS_CERTBOT_EMAIL}" \
            --redirect \
            -n || certbot --nginx \
            -d "${VPS_DOMAIN}" \
            --agree-tos \
            -m "${VPS_CERTBOT_EMAIL}" \
            --redirect \
            -n

          nginx -t
          systemctl reload nginx
          REMOTE

      - name: Rsync site to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_TARGET_DIR'"
          export RSYNC_RSH="ssh -p $PORT"
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".DS_Store" \
            --exclude "scripts/" \
            ./ \
            "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR"

      - name: Verify nginx (optional)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" \
            "$VPS_USER@$VPS_HOST" \
            "nginx -t && systemctl reload nginx || true"
