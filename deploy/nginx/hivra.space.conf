server {
    listen 80;
    listen [::]:80;
    server_name hivra.space www.hivra.space;
    return 301 https://hivra.space$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hivra.space www.hivra.space;

    root /var/www/hivra.space;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/hivra.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hivra.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    etag on;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

    open_file_cache max=1000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    error_page 404 /404.html;

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 7d;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        try_files $uri =404;
    }

    location ~ \.html$ {
        expires -1;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        try_files $uri =404;
    }

    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        try_files $uri $uri/ =404;
    }
}
